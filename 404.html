<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>KDLearnSpace</title>
  <script>
    // GitHub Pages SPA routing trick
    // Converts /some/path to /?/some/path and redirects to index.html
    var segmentCount = 0; // set to 0 if deploying to root domain (not /repo-name)
    var l = window.location;
    sessionStorage.redirect = location.href;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
